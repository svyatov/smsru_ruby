plugins:
  - rubocop-minitest

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Command methods that return true on success (e.g. Stoplist#add) are not predicates.
Naming/PredicateMethod:
  Enabled: false

# The result objects use `class X < Data.define(...)` rather than `X = Data.define(...) do`
# on purpose: Steep can only type-check Data subclasses written in the inheritance form
# (it mis-attributes the assignment-block form's methods to the enclosing class).
Style/DataInheritance:
  Enabled: false

Layout/LineLength:
  Max: 120

# `#:` / `#[...]` are RBS inline type annotations (e.g. `uri = URI(s) #: URI::HTTP`),
# not ordinary comments — they must keep the no-space form for Steep to read them.
Layout/LeadingCommentSpace:
  AllowRBSInlineAnnotation: true

Metrics/MethodLength:
  Max: 15
  Exclude:
    - "test/**/*"

Metrics/BlockLength:
  Exclude:
    - "test/**/*"

Metrics/AbcSize:
  Max: 20
  Exclude:
    - "test/**/*"

Metrics/ClassLength:
  Exclude:
    - "test/**/*"

Minitest/MultipleAssertions:
  Max: 15

# Keyword arguments are self-documenting; don't penalize methods like #deliver.
Metrics/ParameterLists:
  CountKeywordArgs: false
